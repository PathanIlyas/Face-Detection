<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Security Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #121824;
            --accent-primary: #00d7ff;
            --accent-secondary: #00ff87;
            --accent-error: #ff3b30;
            --text-primary: #f5f6f8;
            --text-secondary: #8e9bb2;
            --border-color: #243048;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient light glows */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 215, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 1;
        }

        .glow-1 {
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(0, 255, 135, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }

        /* Login Card */
        .login-card {
            width: 420px;
            background-color: rgba(18, 24, 36, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card-header {
            text-align: center;
        }

        .brand-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            color: #000;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .brand-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Form styling */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .form-control {
            background-color: #1b2336;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--accent-primary);
        }

        .btn-login {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: #000;
            font-weight: 700;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .error-message {
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--accent-error);
            border: 1px solid rgba(255, 59, 48, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="login-card">
        <div class="card-header">
            <div class="brand-logo">S</div>
            <h1 class="brand-name">Security Center</h1>
            <p class="brand-subtitle">AI Surveillance Monitoring Login</p>
        </div>

        {% if form.errors %}
        <div class="error-message">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter username" required autofocus>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-login">Access Control Panel</button>
        </form>
    </div>
</body>
</html>
